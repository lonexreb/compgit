name: Compgit
options:
  bundleIdPrefix: com.lonexreb.compgit
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

# Local SPM dependency. Path is relative to this project.yml.
packages:
  CompgitCore:
    path: ../../packages/shared-swift

# App-Group ID used by SharedStore — replace TEAMID with the real Apple
# Developer Team ID before generating. This is the only string that needs
# to change; everything else flows from it.
attributes:
  ORGANIZATIONNAME: lonexreb

settings:
  base:
    DEVELOPMENT_TEAM: TEAMID
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    APP_GROUP_ID: group.TEAMID.compgit
    KEYCHAIN_ACCESS_GROUP: $(AppIdentifierPrefix)compgit
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GCC_TREAT_WARNINGS_AS_ERRORS: "YES"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "YES"

targets:
  CompgitApp:
    type: application
    platform: iOS
    sources:
      - path: CompgitApp
        optional: true
    dependencies:
      - package: CompgitCore
        product: CompgitCore
      - package: CompgitCore
        product: CompgitSchema
      - target: CompgitWidgetExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lonexreb.compgit
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    info:
      path: CompgitApp/Info.plist
      properties:
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.lonexreb.compgit.refresh
        CFBundleDisplayName: Compgit
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: CompgitApp/CompgitApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.TEAMID.compgit
        keychain-access-groups:
          - $(AppIdentifierPrefix)compgit

  CompgitWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: CompgitWidgetExtension
        optional: true
    dependencies:
      - package: CompgitCore
        product: CompgitCore
      - package: CompgitCore
        product: CompgitSchema
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lonexreb.compgit.widget
    info:
      path: CompgitWidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: Compgit Widget
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: CompgitWidgetExtension/CompgitWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.TEAMID.compgit
        keychain-access-groups:
          - $(AppIdentifierPrefix)compgit
