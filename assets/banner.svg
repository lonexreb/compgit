<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="compgit — a quiet github commit tracker">
  <defs>
    <style><![CDATA[
      .bg { fill: #1a1a1a; }
      .border { stroke: #2e2e2e; stroke-width: 1; fill: none; }
      .display {
        font-family: Fraunces, 'Times New Roman', Georgia, serif;
        font-weight: 400;
        fill: #f0f0f0;
      }
      .mono {
        font-family: 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace;
        fill: #e8e8e8;
      }
      .muted { fill: #8a8a8a; }
      .faint { fill: #555555; }
      .accent { fill: #4fae5c; }
      .spark { stroke: #8a8a8a; stroke-width: 1.4; fill: none; }
      .spark-peak { fill: #4fae5c; }
      .cell-0 { fill: #262626; }
      .cell-1 { fill: #2e4a36; }
      .cell-2 { fill: #346b42; }
      .cell-3 { fill: #3d8c4e; }
      .cell-4 { fill: #4fae5c; }
    ]]></style>
  </defs>

  <rect class="bg" width="1200" height="360" />

  <!-- top meta line -->
  <g transform="translate(60, 52)">
    <text class="mono muted" font-size="13" letter-spacing="2">COMPGIT · GITHUB COMMITS, QUIETLY VISIBLE</text>
    <text class="mono faint" font-size="13" letter-spacing="2" x="1080">v0.0.0</text>
  </g>

  <!-- divider -->
  <line class="border" x1="60" y1="76" x2="1140" y2="76" />

  <!-- hero number -->
  <g transform="translate(60, 214)">
    <text class="display" font-size="168" letter-spacing="-4">13</text>
    <text class="mono muted" font-size="13" letter-spacing="3" y="34">COMMITS TODAY</text>
  </g>

  <!-- tagline -->
  <g transform="translate(420, 150)">
    <text class="display" font-size="42" fill="#f0f0f0">a quiet commit tracker</text>
    <text class="display" font-size="42" y="52" fill="#f0f0f0">across <tspan class="accent">chrome</tspan> · iphone · macos.</text>
    <text class="mono muted" font-size="14" y="100" letter-spacing="2">TREND ANALYSIS — DAY · WEEK · MONTH · YEAR</text>
    <text class="mono muted" font-size="14" y="122" letter-spacing="2">COMPARE YOUR SHIPPING PACE WITH DEVS YOU FOLLOW</text>
  </g>

  <!-- sparkline sample -->
  <g transform="translate(60, 276)">
    <text class="mono faint" font-size="11" letter-spacing="3" y="-4">PAST 7 DAYS</text>
    <path class="spark" d="M 0 30 L 32 24 L 64 22 L 96 8 L 128 14 L 160 28 L 192 12" />
    <circle class="spark-peak" cx="192" cy="12" r="2.5" />
  </g>

  <!-- mini heatmap -->
  <g transform="translate(420, 280)">
    <text class="mono faint" font-size="11" letter-spacing="3" y="-6">PAST 4 WEEKS</text>
    <g>
      <!-- 4 weeks x 7 rows, hand-packed for a tidy composition -->
      <!-- week 1 -->
      <rect class="cell-0" x="0"   y="0"  width="11" height="11"/>
      <rect class="cell-1" x="0"   y="14" width="11" height="11"/>
      <rect class="cell-2" x="0"   y="28" width="11" height="11"/>
      <rect class="cell-1" x="0"   y="42" width="11" height="11"/>
      <rect class="cell-3" x="0"   y="56" width="11" height="11"/>
      <rect class="cell-0" x="0"   y="70" width="11" height="11"/>
      <rect class="cell-1" x="0"   y="84" width="11" height="11"/>
      <!-- week 2 -->
      <rect class="cell-2" x="14"  y="0"  width="11" height="11"/>
      <rect class="cell-3" x="14"  y="14" width="11" height="11"/>
      <rect class="cell-1" x="14"  y="28" width="11" height="11"/>
      <rect class="cell-4" x="14"  y="42" width="11" height="11"/>
      <rect class="cell-2" x="14"  y="56" width="11" height="11"/>
      <rect class="cell-0" x="14"  y="70" width="11" height="11"/>
      <rect class="cell-2" x="14"  y="84" width="11" height="11"/>
      <!-- week 3 -->
      <rect class="cell-1" x="28"  y="0"  width="11" height="11"/>
      <rect class="cell-2" x="28"  y="14" width="11" height="11"/>
      <rect class="cell-4" x="28"  y="28" width="11" height="11"/>
      <rect class="cell-3" x="28"  y="42" width="11" height="11"/>
      <rect class="cell-2" x="28"  y="56" width="11" height="11"/>
      <rect class="cell-1" x="28"  y="70" width="11" height="11"/>
      <rect class="cell-0" x="28"  y="84" width="11" height="11"/>
      <!-- week 4 -->
      <rect class="cell-3" x="42"  y="0"  width="11" height="11"/>
      <rect class="cell-4" x="42"  y="14" width="11" height="11"/>
      <rect class="cell-2" x="42"  y="28" width="11" height="11"/>
      <rect class="cell-3" x="42"  y="42" width="11" height="11"/>
      <rect class="cell-1" x="42"  y="56" width="11" height="11"/>
      <rect class="cell-2" x="42"  y="70" width="11" height="11"/>
      <rect class="cell-4" x="42"  y="84" width="11" height="11" stroke="#4fae5c" stroke-width="1.5"/>
    </g>
  </g>
</svg>
